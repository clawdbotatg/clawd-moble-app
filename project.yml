name: ClawdChat
options:
  bundleIdPrefix: com.clawd
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    from: 3.31.3
  swift-huggingface:
    url: https://github.com/huggingface/swift-huggingface
    from: 0.9.0
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    from: 1.3.0

targets:
  ClawdChat:
    type: application
    platform: iOS
    sources:
      - ClawdChat
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXHuggingFace
      - package: swift-huggingface
        product: HuggingFace
      - package: swift-transformers
        product: Tokenizers
    info:
      path: ClawdChat/Info.plist
      properties:
        CFBundleDisplayName: Clawd Chat
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: ClawdChat/ClawdChat.entitlements
      properties:
        # Lets iOS grant the app more RAM than the default per-app ceiling —
        # needed headroom for 2B-parameter model weights + KV cache.
        com.apple.developer.kernel.increased-memory-limit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clawd.chat
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
